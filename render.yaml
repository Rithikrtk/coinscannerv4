services:
  - type: web
    name: coin-scanner
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: coin-scanner-db
          property: connectionString
      - key: NEWS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: COINDCX_API_KEY
        sync: false
      - key: COINDCX_SECRET
        sync: false
      - key: MSG91_API_KEY
        sync: false
      - key: MSG91_SENDER_ID
        sync: false
      - key: MSG91_WIDGET_ID
        sync: false
      - key: MSG91_TOKEN_AUTH
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: coin-scanner-db
    plan: free